<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Escrita Fiscal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo-sigla {
      background: #e05929; color: #fff; font-weight: 700;
      font-size: 0.85rem; padding: 4px 10px; border-radius: 4px;
      display: inline-block; margin-bottom: 0.5rem;
    }
    h1 { text-align: center; font-size: 1.25rem; color: #f1f5f9; margin-bottom: 0.25rem; }
    .sub { text-align: center; font-size: 0.8rem; color: #94a3b8; margin-bottom: 2rem; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.65rem 0.9rem; border-radius: 6px;
      border: 1px solid #475569; background: #0f172a; color: #f1f5f9;
      font-size: 0.9rem; margin-bottom: 1rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e05929; }
    button {
      width: 100%; padding: 0.75rem; border-radius: 6px; border: none;
      background: #e05929; color: #fff; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #c74e22; }
    .erro {
      background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 0.65rem 0.9rem; border-radius: 6px; font-size: 0.82rem;
      margin-bottom: 1rem; display: none;
    }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.72rem; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-sigla">Metas</span>
      <h1>Escrita Fiscal</h1>
      <p class="sub">Dashboard de Metas da Equipe</p>
    </div>
    <div class="erro" id="erro">Usuário ou senha incorretos.</div>
    <form id="form">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" name="usuario" placeholder="seu-usuario" autocomplete="username" required>
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password" required>
      <button type="submit">Entrar</button>
    </form>
    <div class="footer">Thomson Reuters · Escrita Fiscal · 2026</div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const erro = document.getElementById('erro');
      erro.style.display = 'none';
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario: document.getElementById('usuario').value,
          senha: document.getElementById('senha').value
        })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = data.redirect;
      } else {
        erro.style.display = 'block';
      }
    });
  </script>
</body>
</html>
