<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metas da Equipe | Escrita Fiscal</title>
  <link rel="stylesheet" href="/css/app-v2.css">
</head>
<body>

  <nav id="nav-v2"></nav>

  <div class="v2-main">

    <header class="v2-header">
      <div>
        <h1 class="v2-header__title header__title">Metas da Equipe</h1>
        <span class="v2-header__subtitle header__subtitle">Escrita Fiscal — Thomson Reuters / Betha</span>
      </div>
      <div class="v2-header__acoes">
        <div class="v2-btn-group">
          <button id="btn-odbc" class="v2-btn v2-btn--primario" title="Consultar banco ODBC">ODBC</button>
          <button id="btn-cache" class="v2-btn" title="Consultar cache">Cache</button>
        </div>
      </div>
    </header>

    <div id="eq-fonte-info" class="v2-leitura" hidden></div>

    <main id="equipes-main" class="dashboard">
      <div class="loading" id="equipes-loading">
        <div class="loading__spinner"></div>
        <span>Carregando...</span>
      </div>
    </main>

    <footer style="margin-top:auto;padding-top:var(--v2-gap-lg);font-size:0.75rem;color:var(--v2-texto-sec);">
      Dashboard Escrita Fiscal v2 &middot; Coord. Vitor Justino
    </footer>
  </div>

  <script src="/js/nav-v2.js"></script>
  <script src="/js/format-utils.js"></script>
  <script src="/js/metas-config.js"></script>
  <script src="/js/equipes-mensal.js"></script>
  <script src="/js/equipes-detalhe.js"></script>
  <script src="/js/app-equipes.js"></script>
</body>
</html>
