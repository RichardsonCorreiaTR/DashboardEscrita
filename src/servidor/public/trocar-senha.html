<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Escrita Fiscal — Definir Senha</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo-sigla {
      background: #e05929; color: #fff; font-weight: 700;
      font-size: 0.85rem; padding: 4px 10px; border-radius: 4px;
      display: inline-block; margin-bottom: 0.5rem;
    }
    h1 { text-align: center; font-size: 1.2rem; color: #f1f5f9; margin-bottom: 0.25rem; }
    .sub { text-align: center; font-size: 0.8rem; color: #94a3b8; margin-bottom: 1.5rem; }
    .aviso {
      background: #1c3a5e; border: 1px solid #2563eb; color: #93c5fd;
      padding: 0.75rem; border-radius: 6px; font-size: 0.82rem;
      margin-bottom: 1.5rem; line-height: 1.5;
    }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.65rem 0.9rem; border-radius: 6px;
      border: 1px solid #475569; background: #0f172a; color: #f1f5f9;
      font-size: 0.9rem; margin-bottom: 1rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e05929; }
    button {
      width: 100%; padding: 0.75rem; border-radius: 6px; border: none;
      background: #e05929; color: #fff; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #c74e22; }
    .erro {
      background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 0.65rem; border-radius: 6px; font-size: 0.82rem;
      margin-bottom: 1rem; display: none;
    }
    .req { font-size: 0.75rem; color: #64748b; margin-top: -0.75rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-sigla">Metas</span>
      <h1>Definir sua senha</h1>
      <p class="sub">Primeiro acesso — escolha uma senha pessoal</p>
    </div>
    <div class="aviso">
      🔒 Esta é sua senha de acesso ao Dashboard de Metas.<br>
      Escolha algo que só você saiba e não compartilhe com ninguém.
    </div>
    <div class="erro" id="erro"></div>
    <form id="form">
      <label for="nova">Nova senha</label>
      <input type="password" id="nova" placeholder="Mínimo 6 caracteres" required minlength="6">
      <p class="req">Mínimo 6 caracteres</p>
      <label for="confirma">Confirmar senha</label>
      <input type="password" id="confirma" placeholder="Repita a senha" required>
      <button type="submit">Salvar e entrar</button>
    </form>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const erro = document.getElementById('erro');
      erro.style.display = 'none';
      const nova = document.getElementById('nova').value;
      const confirma = document.getElementById('confirma').value;
      if (nova !== confirma) {
        erro.textContent = 'As senhas não conferem.';
        erro.style.display = 'block';
        return;
      }
      if (nova.length < 6) {
        erro.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        erro.style.display = 'block';
        return;
      }
      const res = await fetch('/auth/trocar-senha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nova_senha: nova })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = data.redirect;
      } else {
        erro.textContent = data.erro || 'Erro ao salvar senha.';
        erro.style.display = 'block';
      }
    });
  </script>
</body>
</html>
